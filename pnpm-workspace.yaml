packages:
  - "apps/*"
  - "packages/*"

# pnpm 11+: explicit approval for dependency postinstall scripts (replaces onlyBuiltDependencies).
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  esbuild: true
  sharp: true
  msgpackr-extract: true

# Dedupe ioredis so BullMQ and our jobs package share one copy/type.
overrides:
  ioredis: "5.11.1"
